<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="Aurum Suite - Premium calculator and smart converter web app with scientific tools, currency conversion, unit conversion, luxury UI.">

  <meta name="keywords" content="calculator, currency converter, unit converter, scientific calculator, premium calculator, Aurum Suite">

  <meta name="author" content="Ayush Raj">

  <meta name="theme-color" content="#111111">

  <meta property="og:title" content="Aurum Suite">
  <meta property="og:description" content="Premium calculator & smart converter web app.">
  <meta property="og:image" content="https://ayushrajfrontend.github.io/aurum-suite/images/preview.jpg">
  <meta property="og:url" content="https://ayushrajfrontend.github.io/aurum-suite/">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Aurum Suite">
  <meta name="twitter:description" content="Premium calculator & smart converter web app.">
  <meta name="twitter:image" content="https://ayushrajfrontend.github.io/aurum-suite/images/preview.jpg">
  <title>Aurum Suite</title>

  <link rel="icon" type="image/png" href="images/fevicon.png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="glow glow1"></div>
  <div class="glow glow2"></div>

  <div class="calculator">
    <div class="display" id="display">0</div>
    <div class="history-box">
    <div class="history" id="history">No history</div>
    <button id="clearHistory">🗑</button>
    </div>

    <div class="mode-switch">
    <button id="calcMode" class="mode-btn active">CALC</button>
    <button id="convertMode" class="mode-btn">CONVERT</button>
    </div>

    <div id="calculatorSection">

    <div class="mode-toggle">
     <button id="sciToggle">SCI</button>
    </div>

<div class="scientific-row" id="scientificRow">
  <button>√</button>
  <button>x²</button>
  <button>(</button>
  <button>)</button>
</div>

    <div class="buttons">
      <button class="operator">C</button>
      <button class="operator">DEL</button>
      <button class="operator">%</button>
      <button class="operator">÷</button>

      <button>7</button>
      <button>8</button>
      <button>9</button>
      <button class="operator">×</button>

      <button>4</button>
      <button>5</button>
      <button>6</button>
      <button class="operator">-</button>

      <button>1</button>
      <button>2</button>
      <button>3</button>
      <button class="operator">+</button>

      <button>0</button>
      <button>.</button>
      <button class="equal">=</button>
    </div>
  </div>

<div id="converterSection" class="hidden">
  
    <div class="convert-type">
    <button id="currencyTab" class="convert-tab active">💱 Currency</button>
    <button id="lengthTab" class="convert-tab">📏 Length</button>
    <button id="weightTab" class="convert-tab">⚖️ Weight</button>
    <button id="tempTab" class="convert-tab">🌡 Temp</button>
  </div>
  
  <input type="number" id="amount" placeholder="Enter amount">

  <select id="fromCurrency">
    <option>INR</option>
    <option>USD</option>
    <option>EUR</option>
    <option>GBP</option>
    <option>JPY</option>
    <option>AED</option>
  </select>
  
   <button id="swapBtn">⇄</button>

  <select id="toCurrency">
    <option>USD</option>
    <option>INR</option>
    <option>EUR</option>
    <option>GBP</option>
    <option>JPY</option>
    <option>AED</option>
  </select>

  <button id="convertBtn">Convert</button>

  </div>
</div>
  
    <button id="installBtn" class="install-btn hidden">
    📲 Install Aurum Suite
    </button>
  
  <footer class="footer">
  <div class="footer-line"></div>
  <p>Crafted in gold & code ✨</p>
  <h3>AYUSH RAJ</h3>
  </footer>
  
  <audio id="clickSound">
  <source src="sounds/click.mp3" type="audio/mp3">
  </audio>
  
  <script src="script.js"></script>
</body>
</html>
